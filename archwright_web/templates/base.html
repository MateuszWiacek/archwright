<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Archwright{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"JetBrains Mono"', '"Fira Code"', 'ui-monospace', 'monospace'],
                        sans: ['"Inter"', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        hull: {
                            50:  '#f0f4f8',
                            100: '#d9e2ec',
                            200: '#bcccdc',
                            300: '#9fb3c8',
                            400: '#829ab1',
                            500: '#627d98',
                            600: '#486581',
                            700: '#334e68',
                            800: '#243b53',
                            900: '#102a43',
                            950: '#0a1929',
                        },
                    },
                },
            },
        }
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { background: #0a1929; color: #d9e2ec; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
        .log-ERROR { color: #f87171; font-weight: 600; }
        .log-WARNING { color: #fbbf24; font-weight: 600; }
        .log-DEBUG { color: #627d98; }
        /* Blueprint grid background */
        .blueprint-bg {
            background-image:
                linear-gradient(rgba(99,179,237,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,179,237,0.04) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        /* Glow border for panels */
        .panel {
            background: rgba(16,42,67,0.7);
            border: 1px solid rgba(99,179,237,0.15);
            backdrop-filter: blur(8px);
        }
        .panel-bright {
            background: rgba(16,42,67,0.9);
            border: 1px solid rgba(99,179,237,0.25);
        }
        /* Input styling */
        input, select, textarea {
            background: rgba(10,25,41,0.8) !important;
            border-color: rgba(99,179,237,0.2) !important;
            color: #d9e2ec !important;
        }
        input:focus, select:focus, textarea:focus {
            border-color: rgba(99,179,237,0.5) !important;
            outline: none !important;
            box-shadow: 0 0 0 2px rgba(99,179,237,0.15) !important;
        }
        input::placeholder { color: #486581 !important; }
        /* Status indicator pulse */
        @keyframes status-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body class="h-full font-sans blueprint-bg" hx-boost="true">
    <div class="min-h-full">
        <!-- Top bar -->
        <nav class="border-b border-hull-700/50 bg-hull-950/80 backdrop-blur-sm">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="flex h-12 items-center justify-between">
                    <div class="flex items-center gap-6">
                        <a href="/{{ job_query | default('') }}" class="flex items-center gap-2">
                            <span class="text-sky-400 font-mono font-bold text-sm tracking-widest uppercase">Archwright</span>
                        </a>
                        <div class="h-4 w-px bg-hull-700"></div>
                        <div class="flex gap-0.5">
                            <a href="/{{ job_query | default('') }}" class="{% if active_page == 'dashboard' %}bg-hull-800 text-hull-100{% else %}text-hull-400 hover:bg-hull-800/50 hover:text-hull-200{% endif %} rounded px-3 py-1.5 text-xs font-medium font-mono tracking-wide transition-colors">DASH</a>
                            <a href="/config/{{ job_query | default('') }}" class="{% if active_page == 'config' %}bg-hull-800 text-hull-100{% else %}text-hull-400 hover:bg-hull-800/50 hover:text-hull-200{% endif %} rounded px-3 py-1.5 text-xs font-medium font-mono tracking-wide transition-colors">CONFIG</a>
                            <a href="/archives/{{ job_query | default('') }}" class="{% if active_page == 'archives' %}bg-hull-800 text-hull-100{% else %}text-hull-400 hover:bg-hull-800/50 hover:text-hull-200{% endif %} rounded px-3 py-1.5 text-xs font-medium font-mono tracking-wide transition-colors">ARCHIVES</a>
                            <a href="/restore/{{ job_query | default('') }}" class="{% if active_page == 'restore' %}bg-hull-800 text-hull-100{% else %}text-hull-400 hover:bg-hull-800/50 hover:text-hull-200{% endif %} rounded px-3 py-1.5 text-xs font-medium font-mono tracking-wide transition-colors">RESTORE</a>
                        </div>
                    </div>
                    <div class="text-hull-600 text-xs font-mono">v1.0.0</div>
                </div>
            </div>
        </nav>

        <main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-6">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
