# backup-config.example.yaml
# Full example showing file collection, database dumps, and service hooks.

backup_name: "vaultwarden_full"
target_base_dir: "/srv/backups/vaultwarden"
keep_last: 5  # 0 = keep everything

structure:
  vaultwarden:
    config:
      source_dir: "/opt/vaultwarden/data"
      include: "*.json"
      exclude: "*-tmp.json"
    attachments:
      source_dir: "/opt/vaultwarden/data/attachments"
      include: "*"
      # Stop the container before copying attachments for consistency.
      # Restart is always attempted, and a failed restart makes the run fail.
      pre_command: "docker stop vaultwarden"
      post_command: "docker start vaultwarden"
  logs:
    application:
      source_dir: "/var/log/vaultwarden"
      include: "*.{log,txt}"

# Optional: database dumps run BEFORE file collection.
databases:
  vaultwarden_sqlite:
    provider: "sqlite"
    db_path: "/opt/vaultwarden/data/db.sqlite3"
    # sqlite3 .backup is a safe hot copy - no service stop needed.

