<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="420" viewBox="0 0 1300 420" role="img" aria-labelledby="title desc">
  <title id="title">archwright banner</title>
  <desc id="desc">A dark technical banner showing Archwright transforming a YAML backup plan into a clean ZIP archive.</desc>
  <defs>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17314c"/>
      <stop offset="100%" stop-color="#122740"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4db7ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4db7ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4db7ff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1d4160" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#05111f" flood-opacity="0.45"/>
    </filter>
